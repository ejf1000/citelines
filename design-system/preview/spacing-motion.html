<!doctype html><html><head><meta charset="utf-8"><title>Motion</title>
<link rel="stylesheet" href="_card.css"></head><body>
<style>
  .row-mot { display: grid; grid-template-columns: 110px 1fr 200px; gap: 12px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border-hairline); }
  .row-mot:last-child { border:none; }
  .lab { font-family: var(--font-body); font-weight: 500; font-size: 13px; color: var(--fg-1); }
  .dur { font-family: var(--font-mono); font-size: 12px; color: var(--ink-700); }
  .curve { height: 36px; }
</style>
<div class="card">
  <div class="eyebrow" style="margin-bottom:10px">Motion · easing &amp; duration</div>
  <div class="row-mot">
    <span class="lab">Standard</span>
    <svg class="curve" viewBox="0 0 200 36" preserveAspectRatio="none"><path d="M0,32 C40,32 90,4 200,4" fill="none" stroke="#214b7c" stroke-width="1.5"/></svg>
    <span class="dur">cubic-bezier(.2,.7,.2,1)</span>
  </div>
  <div class="row-mot">
    <span class="lab">Entrance</span>
    <svg class="curve" viewBox="0 0 200 36" preserveAspectRatio="none"><path d="M0,32 C32,32 60,4 200,4" fill="none" stroke="#214b7c" stroke-width="1.5"/></svg>
    <span class="dur">cubic-bezier(.16,1,.3,1)</span>
  </div>
  <div class="row-mot">
    <span class="lab">Fast</span>
    <span style="font-family:var(--font-body);font-size:13px;color:var(--fg-3)">hovers, color shifts</span>
    <span class="dur">120ms · --dur-fast</span>
  </div>
  <div class="row-mot">
    <span class="lab">Base</span>
    <span style="font-family:var(--font-body);font-size:13px;color:var(--fg-3)">default UI motion</span>
    <span class="dur">200ms · --dur-base</span>
  </div>
  <div class="row-mot">
    <span class="lab">Slow</span>
    <span style="font-family:var(--font-body);font-size:13px;color:var(--fg-3)">panels, toasts, page enter</span>
    <span class="dur">320ms · --dur-slow</span>
  </div>
</div></body></html>
