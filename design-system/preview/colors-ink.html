<!doctype html><html><head><meta charset="utf-8"><title>Brand ink scale</title>
<link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Brand · Ink Blue</div>
  <div class="grid-5">
    <div><div class="sw" style="background:#eef3fa"><span class="tag">50</span></div><div class="tok" style="margin-top:6px">--ink-50</div></div>
    <div><div class="sw" style="background:#d8e3f2"><span class="tag">100</span></div><div class="tok" style="margin-top:6px">--ink-100</div></div>
    <div><div class="sw" style="background:#b3c6e2"><span class="tag">200</span></div><div class="tok" style="margin-top:6px">--ink-200</div></div>
    <div><div class="sw" style="background:#82a2c9"><span class="tag">300</span></div><div class="tok" style="margin-top:6px">--ink-300</div></div>
    <div><div class="sw" style="background:#527eaf"><span class="tag dark">400</span></div><div class="tok" style="margin-top:6px">--ink-400</div></div>
  </div>
  <div class="grid-5" style="margin-top:14px">
    <div><div class="sw" style="background:#2f5e93"><span class="tag dark">500</span></div><div class="tok" style="margin-top:6px">--ink-500</div></div>
    <div><div class="sw" style="background:#214b7c"><span class="tag dark">600 · primary</span></div><div class="tok" style="margin-top:6px">--ink-600</div></div>
    <div><div class="sw" style="background:#1a3c66"><span class="tag dark">700</span></div><div class="tok" style="margin-top:6px">--ink-700</div></div>
    <div><div class="sw" style="background:#142e4f"><span class="tag dark">800</span></div><div class="tok" style="margin-top:6px">--ink-800</div></div>
    <div><div class="sw" style="background:#0f2239"><span class="tag dark">900</span></div><div class="tok" style="margin-top:6px">--ink-900</div></div>
  </div>
</div>
</body></html>
