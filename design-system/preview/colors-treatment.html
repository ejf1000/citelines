<!doctype html><html><head><meta charset="utf-8"><title>Treatment colors</title>
<link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Citation Treatment · semantic signals</div>
  <div class="col" style="gap:10px">
    <div class="row between" style="padding:10px 14px;background:#ffffff;border:1px solid var(--border-hairline);border-radius:8px">
      <div class="row" style="gap:10px">
        <span style="width:10px;height:10px;border-radius:99px;background:#4a7c59"></span>
        <span class="label">Affirmed</span>
        <span class="sub">— good standing</span>
      </div>
      <span class="tok">--treat-affirmed · #4a7c59</span>
    </div>
    <div class="row between" style="padding:10px 14px;background:#ffffff;border:1px solid var(--border-hairline);border-radius:8px">
      <div class="row" style="gap:10px">
        <span style="width:10px;height:10px;border-radius:99px;background:#2f5e93"></span>
        <span class="label">Cited</span>
        <span class="sub">— neutral mention</span>
      </div>
      <span class="tok">--treat-cited · #2f5e93</span>
    </div>
    <div class="row between" style="padding:10px 14px;background:#ffffff;border:1px solid var(--border-hairline);border-radius:8px">
      <div class="row" style="gap:10px">
        <span style="width:10px;height:10px;border-radius:99px;background:#c98b3c"></span>
        <span class="label">Questioned</span>
        <span class="sub">— criticized · distinguished</span>
      </div>
      <span class="tok">--treat-questioned · #c98b3c</span>
    </div>
    <div class="row between" style="padding:10px 14px;background:#ffffff;border:1px solid var(--border-hairline);border-radius:8px">
      <div class="row" style="gap:10px">
        <span style="width:10px;height:10px;border-radius:99px;background:#c8553d"></span>
        <span class="label">Overruled</span>
        <span class="sub">— no longer good law</span>
      </div>
      <span class="tok">--treat-overruled · #c8553d</span>
    </div>
  </div>
</div></body></html>
