<!doctype html><html><head><meta charset="utf-8"><title>Accents</title>
<link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Accents · used sparingly</div>
  <div class="grid-3">
    <div>
      <div class="row" style="gap:8px">
        <div style="width:48px;height:48px;border-radius:8px;background:#c98b3c"></div>
        <div style="width:48px;height:48px;border-radius:8px;background:#f3e2c3"></div>
      </div>
      <div class="label" style="margin-top:8px">Amber</div>
      <div class="sub">annotations · starred · questioned</div>
      <div class="tok" style="margin-top:4px">--accent-amber</div>
    </div>
    <div>
      <div class="row" style="gap:8px">
        <div style="width:48px;height:48px;border-radius:8px;background:#c8553d"></div>
        <div style="width:48px;height:48px;border-radius:8px;background:#f5d9d1"></div>
      </div>
      <div class="label" style="margin-top:8px">Coral</div>
      <div class="sub">destructive · overruled · dissent</div>
      <div class="tok" style="margin-top:4px">--accent-coral</div>
    </div>
    <div>
      <div class="row" style="gap:8px">
        <div style="width:48px;height:48px;border-radius:8px;background:#4a7c59"></div>
        <div style="width:48px;height:48px;border-radius:8px;background:#d9e6dc"></div>
      </div>
      <div class="label" style="margin-top:8px">Moss</div>
      <div class="sub">good standing · affirmed</div>
      <div class="tok" style="margin-top:4px">--accent-moss</div>
    </div>
  </div>
</div></body></html>
