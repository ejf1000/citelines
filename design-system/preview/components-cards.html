<!doctype html><html><head><meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Cards · the case-row pattern</div>
  <div class="col" style="gap:10px">
    <div style="background:#ffffff;border:1px solid var(--border-hairline);border-radius:12px;padding:18px 20px;box-shadow:0 1px 2px rgba(33,31,27,0.04)">
      <div class="row between" style="margin-bottom:4px">
        <div class="row" style="gap:8px">
          <span style="width:6px;height:6px;border-radius:99px;background:#4a7c59"></span>
          <span style="font-family:var(--font-body);font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#4a7c59">Good standing</span>
        </div>
        <span class="tok">SCOTUS · 1954</span>
      </div>
      <div style="font-family:var(--font-display);font-weight:500;font-size:20px;color:var(--ink-900)"><em>Brown v. Board of Education</em></div>
      <div style="font-family:var(--font-mono);font-size:13px;color:var(--ink-700);margin-top:2px">347 U.S. 483</div>
      <p style="font-family:var(--font-body);font-size:14px;line-height:1.55;color:var(--fg-2);margin:8px 0 0">Racial segregation of children in public schools held unconstitutional under the Equal Protection Clause.</p>
    </div>

    <div style="background:#ffffff;border:1px solid var(--border-hairline);border-radius:12px;padding:18px 20px;box-shadow:0 1px 2px rgba(33,31,27,0.04)">
      <div class="row between" style="margin-bottom:4px">
        <div class="row" style="gap:8px">
          <span style="width:6px;height:6px;border-radius:99px;background:#c8553d"></span>
          <span style="font-family:var(--font-body);font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#c8553d">Overruled in part</span>
        </div>
        <span class="tok">SCOTUS · 1896</span>
      </div>
      <div style="font-family:var(--font-display);font-weight:500;font-size:20px;color:var(--ink-900)"><em>Plessy v. Ferguson</em></div>
      <div style="font-family:var(--font-mono);font-size:13px;color:var(--ink-700);margin-top:2px">163 U.S. 537</div>
    </div>
  </div>
</div></body></html>
