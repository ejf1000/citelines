<!doctype html><html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Spacing · 8px grid</div>
  <div class="col" style="gap:8px">
    <div class="row" style="gap:14px"><div style="width:4px;height:14px;background:#214b7c;border-radius:1px"></div><span class="label" style="width:36px">4</span><span class="tok">--space-1</span></div>
    <div class="row" style="gap:14px"><div style="width:8px;height:14px;background:#214b7c;border-radius:1px"></div><span class="label" style="width:36px">8</span><span class="tok">--space-2</span></div>
    <div class="row" style="gap:14px"><div style="width:12px;height:14px;background:#214b7c;border-radius:1px"></div><span class="label" style="width:36px">12</span><span class="tok">--space-3</span></div>
    <div class="row" style="gap:14px"><div style="width:16px;height:14px;background:#214b7c;border-radius:1px"></div><span class="label" style="width:36px">16</span><span class="tok">--space-4</span></div>
    <div class="row" style="gap:14px"><div style="width:24px;height:14px;background:#214b7c;border-radius:1px"></div><span class="label" style="width:36px">24</span><span class="tok">--space-6 · card padding</span></div>
    <div class="row" style="gap:14px"><div style="width:32px;height:14px;background:#214b7c;border-radius:1px"></div><span class="label" style="width:36px">32</span><span class="tok">--space-8 · page gutter</span></div>
    <div class="row" style="gap:14px"><div style="width:48px;height:14px;background:#214b7c;border-radius:1px"></div><span class="label" style="width:36px">48</span><span class="tok">--space-12</span></div>
    <div class="row" style="gap:14px"><div style="width:64px;height:14px;background:#214b7c;border-radius:1px"></div><span class="label" style="width:36px">64</span><span class="tok">--space-16 · section</span></div>
    <div class="row" style="gap:14px"><div style="width:96px;height:14px;background:#214b7c;border-radius:1px"></div><span class="label" style="width:36px">96</span><span class="tok">--space-24 · hero</span></div>
  </div>
</div></body></html>
