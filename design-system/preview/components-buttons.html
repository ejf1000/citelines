<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="_card.css"></head><body>
<style>
  .btn { font-family: var(--font-body); font-weight: 600; font-size: 14px; padding: 10px 18px; border-radius: 8px; border: 1px solid transparent; cursor: pointer; transition: all 200ms cubic-bezier(0.2,0.7,0.2,1); }
  .btn-primary { background: var(--ink-600); color: var(--paper-50); }
  .btn-primary:hover { background: var(--ink-700); }
  .btn-secondary { background: #fff; color: var(--ink-700); border-color: var(--border-strong); }
  .btn-secondary:hover { border-color: var(--ink-500); }
  .btn-ghost { background: transparent; color: var(--ink-700); }
  .btn-ghost:hover { background: var(--paper-100); }
  .btn-destructive { background: var(--accent-coral); color: var(--paper-50); }
</style>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Buttons</div>
  <div class="row" style="gap:12px;flex-wrap:wrap">
    <button class="btn btn-primary">Search</button>
    <button class="btn btn-secondary">Cite this</button>
    <button class="btn btn-ghost">Cancel</button>
    <button class="btn btn-destructive">Delete folder</button>
  </div>
  <div class="row" style="gap:12px;flex-wrap:wrap;margin-top:14px">
    <button class="btn btn-primary" style="padding:8px 14px;font-size:13px">Small primary</button>
    <button class="btn btn-primary" style="padding:14px 24px;font-size:15px">Large primary</button>
    <button class="btn btn-primary" style="opacity:0.5;pointer-events:none">Disabled</button>
  </div>
  <div class="sub" style="margin-top:14px">Hover steps the fill one rung darker. Press: +1px translateY + darker border. No scale, no bounce.</div>
</div></body></html>
