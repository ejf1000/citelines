<!doctype html><html><head><meta charset="utf-8"><title>Semantic tokens</title>
<link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Semantic tokens · foreground &amp; surface</div>
  <div class="grid-3" style="gap:12px">
    <div><div class="sw" style="background:#131210"><span class="tag dark">fg-1</span></div><div class="tok" style="margin-top:6px">primary text</div></div>
    <div><div class="sw" style="background:#34302a"><span class="tag dark">fg-2</span></div><div class="tok" style="margin-top:6px">body text</div></div>
    <div><div class="sw" style="background:#6b6557"><span class="tag dark">fg-3</span></div><div class="tok" style="margin-top:6px">secondary · meta</div></div>
  </div>
  <div class="grid-3" style="gap:12px;margin-top:12px">
    <div><div class="sw" style="background:#fbf8f3"><span class="tag">bg-canvas</span></div><div class="tok" style="margin-top:6px">page</div></div>
    <div><div class="sw" style="background:#ffffff"><span class="tag">bg-surface</span></div><div class="tok" style="margin-top:6px">cards</div></div>
    <div><div class="sw" style="background:#f5efe5"><span class="tag">bg-sunken</span></div><div class="tok" style="margin-top:6px">sidebars</div></div>
  </div>
  <div class="grid-3" style="gap:12px;margin-top:12px">
    <div><div class="sw" style="background:#1a3c66"><span class="tag dark">bg-ink</span></div><div class="tok" style="margin-top:6px">inverted hero</div></div>
    <div><div class="sw" style="background:#ece4d3"><span class="tag">border-hairline</span></div><div class="tok" style="margin-top:6px">dividers</div></div>
    <div><div class="sw" style="background:#d8d3c8"><span class="tag">border-soft</span></div><div class="tok" style="margin-top:6px">inputs</div></div>
  </div>
</div></body></html>
