<!doctype html><html><head><meta charset="utf-8"><title>Voice samples</title>
<link rel="stylesheet" href="_card.css"></head><body>
<style>
  .voice-row { display: grid; grid-template-columns: 110px 1fr 1fr; gap: 14px; padding: 10px 0; border-bottom: 1px solid var(--border-hairline); }
  .voice-row:last-child { border-bottom: none; }
  .voice-head { font-family: var(--font-body); font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); }
  .bad { font-family: var(--font-body); font-size: 14px; color: var(--accent-coral); text-decoration: line-through; }
  .good { font-family: var(--font-body); font-size: 14px; color: var(--fg-1); }
  .place { font-family: var(--font-body); font-size: 13px; font-weight: 600; color: var(--fg-2); }
</style>
<div class="card">
  <div class="eyebrow" style="margin-bottom:8px">Voice · plain, precise, warm</div>
  <div class="voice-row"><span class="voice-head">Where</span><span class="voice-head">Don't</span><span class="voice-head">Do</span></div>
  <div class="voice-row"><span class="place">Hero</span><span class="bad">Revolutionize your research workflow.</span><span class="good">Find the cases that matter. Read why they do.</span></div>
  <div class="voice-row"><span class="place">Empty state</span><span class="bad">No results found.</span><span class="good">Nothing for that query. Try a broader term.</span></div>
  <div class="voice-row"><span class="place">Button</span><span class="bad">Submit Query</span><span class="good">Search</span></div>
  <div class="voice-row"><span class="place">Error</span><span class="bad">Authentication failure.</span><span class="good">We couldn't sign you in. Try again.</span></div>
</div></body></html>
