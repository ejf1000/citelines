<!doctype html><html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Radii · modest, document-feeling</div>
  <div class="row" style="gap:18px;flex-wrap:wrap">
    <div class="col" style="gap:6px;align-items:center"><div style="width:72px;height:48px;background:#ffffff;border:1px solid var(--border-hairline);border-radius:2px"></div><span class="label">2</span><span class="tok">--radius-xs</span><span class="sub">ticks</span></div>
    <div class="col" style="gap:6px;align-items:center"><div style="width:72px;height:48px;background:#ffffff;border:1px solid var(--border-hairline);border-radius:4px"></div><span class="label">4</span><span class="tok">--radius-sm</span><span class="sub">chips</span></div>
    <div class="col" style="gap:6px;align-items:center"><div style="width:72px;height:48px;background:#ffffff;border:1px solid var(--border-hairline);border-radius:8px"></div><span class="label">8</span><span class="tok">--radius-md</span><span class="sub">buttons</span></div>
    <div class="col" style="gap:6px;align-items:center"><div style="width:72px;height:48px;background:#ffffff;border:1px solid var(--border-hairline);border-radius:12px"></div><span class="label">12</span><span class="tok">--radius-lg</span><span class="sub">cards</span></div>
    <div class="col" style="gap:6px;align-items:center"><div style="width:72px;height:48px;background:#ffffff;border:1px solid var(--border-hairline);border-radius:20px"></div><span class="label">20</span><span class="tok">--radius-xl</span><span class="sub">hero</span></div>
    <div class="col" style="gap:6px;align-items:center"><div style="width:72px;height:48px;background:#ffffff;border:1px solid var(--border-hairline);border-radius:999px"></div><span class="label">pill</span><span class="tok">--radius-pill</span><span class="sub">tags</span></div>
  </div>
</div></body></html>
