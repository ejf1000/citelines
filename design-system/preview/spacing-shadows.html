<!doctype html><html><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:18px">Shadows · paper-on-desk, warm-toned</div>
  <div class="grid-4">
    <div class="col" style="gap:8px;align-items:center">
      <div style="width:100%;height:80px;background:#ffffff;border-radius:10px;box-shadow:0 1px 0 rgba(33,31,27,0.04)"></div>
      <span class="label">xs</span><span class="tok">--shadow-xs</span>
    </div>
    <div class="col" style="gap:8px;align-items:center">
      <div style="width:100%;height:80px;background:#ffffff;border-radius:10px;box-shadow:0 1px 2px rgba(33,31,27,0.06), 0 1px 1px rgba(33,31,27,0.04)"></div>
      <span class="label">sm</span><span class="tok">--shadow-sm</span>
    </div>
    <div class="col" style="gap:8px;align-items:center">
      <div style="width:100%;height:80px;background:#ffffff;border-radius:10px;box-shadow:0 4px 12px rgba(33,31,27,0.06), 0 2px 4px rgba(33,31,27,0.04)"></div>
      <span class="label">md</span><span class="tok">--shadow-md</span>
    </div>
    <div class="col" style="gap:8px;align-items:center">
      <div style="width:100%;height:80px;background:#ffffff;border-radius:10px;box-shadow:0 14px 32px rgba(33,31,27,0.08), 0 4px 10px rgba(33,31,27,0.04)"></div>
      <span class="label">lg</span><span class="tok">--shadow-lg</span>
    </div>
  </div>
</div></body></html>
