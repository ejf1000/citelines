<!doctype html><html><head><meta charset="utf-8"><title>Logos</title>
<link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:18px">Logo · mark + wordmark</div>
  <div class="grid-2" style="gap:18px;align-items:stretch">
    <div style="background:var(--paper-50);border:1px solid var(--border-hairline);border-radius:12px;padding:24px;display:flex;align-items:center;justify-content:center;min-height:120px">
      <img src="../assets/logo-wordmark.svg" style="height:48px" alt="Citelines"/>
    </div>
    <div style="background:var(--ink-700);border:1px solid var(--ink-800);border-radius:12px;padding:24px;display:flex;align-items:center;justify-content:center;min-height:120px">
      <img src="../assets/logo-wordmark-light.svg" style="height:48px" alt="Citelines"/>
    </div>
  </div>
  <div class="row" style="gap:12px;margin-top:12px;align-items:center">
    <img src="../assets/logo-mark.svg" style="width:48px;height:48px"/>
    <div class="col" style="gap:2px">
      <span class="label">Mark</span>
      <span class="sub">The C with a "cite line" bisecting its counter, plus a footnote-ref dot. Use as favicon and at icon sizes.</span>
    </div>
  </div>
</div></body></html>
