<!doctype html><html><head><meta charset="utf-8"><title>Type scale</title>
<link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Type Scale</div>
  <div class="col" style="gap:6px">
    <div class="row between"><span style="font-family:var(--font-display);font-weight:500;font-size:48px;line-height:1.05;color:var(--fg-1)">Display 48</span><span class="tok">--fs-48 · display 500</span></div>
    <div class="row between"><span style="font-family:var(--font-display);font-weight:500;font-size:32px;line-height:1.15;color:var(--fg-1)">Heading 32</span><span class="tok">--fs-32 · display 500</span></div>
    <div class="row between"><span style="font-family:var(--font-display);font-weight:500;font-size:24px;line-height:1.3;color:var(--fg-1)">Heading 24</span><span class="tok">--fs-24 · display 500</span></div>
    <div class="row between"><span style="font-family:var(--font-body);font-weight:600;font-size:18px;color:var(--fg-1)">Subhead 18</span><span class="tok">--fs-18 · body 600</span></div>
    <div class="row between"><span style="font-family:var(--font-body);font-weight:400;font-size:16px;color:var(--fg-2)">Body 16 — the workhorse</span><span class="tok">--fs-16 · body 400</span></div>
    <div class="row between"><span style="font-family:var(--font-body);font-weight:400;font-size:14px;color:var(--fg-3)">Small 14 — meta &amp; captions</span><span class="tok">--fs-14 · body 400</span></div>
    <div class="row between"><span style="font-family:var(--font-body);font-weight:600;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg-3)">Eyebrow 12</span><span class="tok">--fs-12 · 600 · uppercase</span></div>
  </div>
</div></body></html>
